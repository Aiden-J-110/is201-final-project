<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Snake Game</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #1a1a24;
            color: #ffffff;
            padding-top: 100px; /* Gives space below the Bootstrap navbar */
        }
        .game-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #2a2a35;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 15px;
        }
        canvas {
            background-color: #1a1a24;
            border: 3px solid #ffcc00;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }
        .controls-text {
            color: #aaa;
            font-size: 14px;
            margin-top: 15px;
        }
        button {
            background-color: #ffcc00;
            color: #1a1a24;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>

    <div class="container mb-3" style="max-width: 500px;">
        <a href="index.html" style="color: #ffcc00; text-decoration: none; font-weight: bold;">← Back to home</a>
    </div>

    <div class="game-container">
        <h1>🐍 Retro Snake Arcade</h1>
        <div id="scoreBoard">Score: 0</div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <p class="controls-text">Use your <strong>Arrow Keys</strong> on your keyboard to move the snake!</p>
        
        <button id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreBoard = document.getElementById("scoreBoard");
        const startBtn = document.getElementById("startBtn");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let apple = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameInterval = null;
        let gameRunning = false;

        // Initialize/Reset game layout state
        function initGame() {
            snake = [{ x: 10, y: 10 }];
            apple = { x: 5, y: 5 };
            dx = 0;
            dy = 0;
            score = 0;
            scoreBoard.innerText = "Score: " + score;
        }

        function startGame() {
            if (gameRunning) return; // Prevent multiple loops running at once
            initGame();
            gameRunning = true;
            startBtn.style.display = "none"; // Hide button while playing
            gameInterval = setInterval(gameLoop, 100); // Ticks every 100ms
        }

        function gameLoop() {
            if (checkGameOver()) {
                clearInterval(gameInterval);
                gameRunning = false;
                alert("Game Over! Your score: " + score);
                startBtn.innerText = "Play Again";
                startBtn.style.display = "inline-block";
                return;
            }

            clearCanvas();
            drawApple();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#1a1a24";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is bright green, body segments are normal green
                ctx.fillStyle = (index === 0) ? "#00ff00" : "#00cc00";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            // Calculate where the head is going
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Don't move if player hasn't pressed a key yet
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            // Did the snake hit the food node?
            if (snake[0].x === apple.x && snake[0].y === apple.y) {
                score += 10;
                scoreBoard.innerText = "Score: " + score;
                respawnApple();
            } else {
                snake.pop(); // Remove tail tip to simulate moving forward
            }
        }

        function drawApple() {
            ctx.fillStyle = "#ff4444"; // Red apple
            ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function respawnApple() {
            apple.x = Math.floor(Math.random() * tileCount);
            apple.y = Math.floor(Math.random() * tileCount);

            // Make sure food doesn't land directly on the snake body
            snake.forEach(part => {
                if (part.x === apple.x && part.y === apple.y) {
                    respawnApple();
                }
            });
        }

        function checkGameOver() {
            if (dx === 0 && dy === 0) return false;

            // Wall collisions
            const hitLeft = snake[0].x < 0;
            const hitRight = snake[0].x >= tileCount;
            const hitTop = snake[0].y < 0;
            const hitBottom = snake[0].y >= tileCount;

            if (hitLeft || hitRight || hitTop || hitBottom) return true;

            // Self-collision (skip checking head element index 0)
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }

            return false;
        }

        // Listen for keyboard input controls
        document.addEventListener("keydown", function(e) {
            if (!gameRunning) return;

            const key = e.key;
            
            // Block instant reverse moves (e.g., turning left while moving right)
            if ((key === "ArrowLeft" || key === "a") && dx !== 1) { dx = -1; dy = 0; }
            if ((key === "ArrowUp" || key === "w") && dy !== 1) { dx = 0; dy = -1; }
            if ((key === "ArrowRight" || key === "d") && dx !== -1) { dx = 1; dy = 0; }
            if ((key === "ArrowDown" || key === "s") && dy !== -1) { dx = 0; dy = 1; }
        });

        // Setup the initial layout view when page loads
        initGame();
        clearCanvas();
        drawSnake();
        drawApple();
    </script>
</body>
</html>
